# OpenCV fisheye calibration parameters for aruco_fisheye_node.py
#
# Before calibration:
#   keep camera_matrix and dist_coeffs empty;
#   launch with enable_pose:=false.
#
# After calibration:
#   fill the matrix and four fisheye coefficients;
#   launch with enable_pose:=true.

camera_model: fisheye

# Native image resolution used during calibration.
calibration_width: 2560
calibration_height: 1440

# Fill as a row-major 3x3 matrix:
# [fx, 0, cx, 0, fy, cy, 0, 0, 1]
camera_matrix: [1105.0710852460152, 0.0, 1252.913633665789, 0.0, 1178.913111799933, 693.7826337376471, 0.0, 0.0, 1.0]

# OpenCV fisheye model uses exactly [k1, k2, k3, k4].
dist_coeffs: [-0.35178111435863124, 0.04760698460581123, 0.06780191219249923, -0.03583946788553547]

# 0.0 crops more; 1.0 retains more field of view and black borders.
fisheye_balance: 0.25